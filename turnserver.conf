# TURN server configuration for Talky
listening-port=3478
tls-listening-port=5349

# Use fingerprint in TURN messages
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Static user credentials
user=talky:TalkyTurnS3cret2024

# Realm
realm=talky

# Server IP (external)
external-ip=148.253.211.224

# Relay IP range
min-port=49152
max-port=65535

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Disable multicast peers
no-multicast-peers

# Disable CLI
no-cli
